name: internal-rust-release

on:
  push:
    tags:
      - "internal-rust-v*.*.*"
      - "rehearsal-internal-rust-v*"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Upstream rust release tag, for example rust-v0.114.0
        required: true
        type: string
      release_ref:
        description: Branch or tag to build from; defaults to main
        required: false
        default: main
        type: string
      internal_tag:
        description: Optional internal tag name to publish against
        required: false
        default: ""
        type: string
      publish:
        description: Publish a real GitHub Release instead of a dry-run bundle
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      internal_tag: ${{ steps.meta.outputs.internal_tag }}
      upstream_tag: ${{ steps.meta.outputs.upstream_tag }}
      version: ${{ steps.meta.outputs.version }}
      publish: ${{ steps.meta.outputs.publish }}
      release_ref: ${{ steps.meta.outputs.release_ref }}
    steps:
      - name: Compute release metadata
        id: meta
        env:
          INPUT_UPSTREAM_TAG: ${{ inputs.upstream_tag }}
          INPUT_RELEASE_REF: ${{ inputs.release_ref }}
          INPUT_INTERNAL_TAG: ${{ inputs.internal_tag }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail

          parse_tag() {
            local value="$1"
            if [[ "${value}" =~ ^internal-(rust-v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              TAG_REHEARSAL=""
              TAG_UPSTREAM="${BASH_REMATCH[1]}"
              return 0
            fi

            if [[ "${value}" =~ ^rehearsal-internal-(rust-v[0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
              TAG_REHEARSAL="rehearsal-"
              TAG_UPSTREAM="${BASH_REMATCH[1]}"
              return 0
            fi
            return 1
          }

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            release_ref="${GITHUB_REF_NAME}"
            internal_tag="${GITHUB_REF_NAME}"
            parse_tag "${internal_tag}" || {
              echo "unexpected internal tag format: ${internal_tag}" >&2
              exit 1
            }
            upstream_tag="${TAG_UPSTREAM}"
            if [[ -n "${TAG_REHEARSAL}" ]]; then
              publish=false
            else
              publish=true
            fi
          else
            upstream_tag="${INPUT_UPSTREAM_TAG}"
            release_ref="${INPUT_RELEASE_REF:-main}"
            internal_tag="${INPUT_INTERNAL_TAG:-}"
            if [[ -z "${internal_tag}" ]]; then
              internal_tag="internal-${upstream_tag}"
            fi
            publish="${INPUT_PUBLISH:-false}"
          fi

          if [[ ! "${upstream_tag}" =~ ^rust-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unexpected upstream tag format: ${upstream_tag}" >&2
            exit 1
          fi

          echo "internal_tag=${internal_tag}" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=${upstream_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${upstream_tag#rust-v}" >> "$GITHUB_OUTPUT"
          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"

  build:
    needs: meta
    name: Build - ${{ matrix.runner }} - ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          # - runner: ubuntu-24.04-arm
          #   target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.meta.outputs.release_ref }}

      - name: Install Linux build dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          packages=(pkg-config libcap-dev)
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            packages+=(libubsan1)
          fi
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends "${packages[@]}"

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        name: Use hermetic Cargo home (musl)
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        name: Install musl build tools
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        name: Configure rustc UBSan wrapper (musl host)
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        name: Clear sanitizer flags (musl)
        shell: bash
        run: |
          set -euo pipefail
          # Avoid problematic aws-lc jitter entropy code path on musl builders.
          echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"
          echo "${target_no_jitter}=1" >> "$GITHUB_ENV"

          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

      - name: Verify Cargo version matches upstream release
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ needs.meta.outputs.version }}"
          actual="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          [[ "${actual}" == "${expected}" ]] || {
            echo "Cargo.toml version ${actual} does not match ${expected}" >&2
            exit 1
          }

      - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl' }}
        name: Configure musl rusty_v8 artifact overrides
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 "${GITHUB_WORKSPACE}/.github/scripts/rusty_v8_bazel.py" resolved-v8-crate-version)"
          release_tag="rusty-v8-v${version}"
          base_url="https://github.com/openai/codex/releases/download/${release_tag}"
          archive="https://github.com/openai/codex/releases/download/rusty-v8-v${version}/librusty_v8_release_${TARGET}.a.gz"
          binding_dir="${RUNNER_TEMP}/rusty_v8"
          binding_path="${binding_dir}/src_binding_release_${TARGET}.rs"
          mkdir -p "${binding_dir}"
          curl -fsSL "${base_url}/src_binding_release_${TARGET}.rs" -o "${binding_path}"
          echo "RUSTY_V8_ARCHIVE=${archive}" >> "$GITHUB_ENV"
          echo "RUSTY_V8_SRC_BINDING_PATH=${binding_path}" >> "$GITHUB_ENV"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --target "${{ matrix.target }}" --release --bin codex --bin codex-responses-api-proxy

      - name: Stage internal release assets
        shell: bash
        run: |
          set -euo pipefail
          release_dir="target/${{ matrix.target }}/release"
          dest="dist/${{ matrix.target }}"
          mkdir -p "${dest}"

          cp "${release_dir}/codex" "${dest}/codex"
          cp "${release_dir}/codex-responses-api-proxy" "${dest}/codex-responses-api-proxy"

          tar -C "${dest}" -czf "${dest}/codex-${{ matrix.target }}.tar.gz" codex
          tar -C "${dest}" -czf "${dest}/codex-responses-api-proxy-${{ matrix.target }}.tar.gz" codex-responses-api-proxy

          rm "${dest}/codex" "${dest}/codex-responses-api-proxy"

      - uses: actions/upload-artifact@v7
        with:
          name: internal-release-${{ matrix.target }}
          path: codex-rs/dist/${{ matrix.target }}/*

  bundle:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.meta.outputs.release_ref }}

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - uses: facebook/install-dotslash@v2

      - name: Stage rg release assets
        shell: bash
        run: |
          set -euo pipefail
          rg_root="${RUNNER_TEMP}/internal-rg"
          mkdir -p "${rg_root}"
          python3 codex-cli/scripts/install_native_deps.py --component rg "${rg_root}"

          for target in \
            x86_64-unknown-linux-musl \
            x86_64-apple-darwin \
            aarch64-apple-darwin
          do
            rg_dir="${rg_root}/vendor/${target}/path"
            tar -C "${rg_dir}" -czf "dist/rg-${target}.tar.gz" rg
          done

      - name: Prepare static release assets
        shell: bash
        run: |
          set -euo pipefail
          cp codex-rs/core/config.schema.json dist/config.schema.json
          cp scripts/install/install.sh dist/install.sh
          cp scripts/install/install.ps1 dist/install.ps1

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          git fetch https://github.com/openai/codex "refs/tags/${{ needs.meta.outputs.upstream_tag }}:refs/tags/${{ needs.meta.outputs.upstream_tag }}"
          upstream_commit="$(git rev-parse "refs/tags/${{ needs.meta.outputs.upstream_tag }}^{commit}")"
          mapfile -t patch_commits < <(git rev-list --reverse --no-merges "${upstream_commit}..HEAD")

          notes_path="${RUNNER_TEMP}/release-notes.md"
          {
            echo "Internal Codex CLI release for upstream \`${{ needs.meta.outputs.upstream_tag }}\`."
            echo
            echo "- release ref: \`${{ needs.meta.outputs.release_ref }}\`"
            echo "- release tag: \`${{ needs.meta.outputs.internal_tag }}\`"
            echo
            echo "## Patch Stack"
            if [[ ${#patch_commits[@]} -eq 0 ]]; then
              echo "- No fork-only patch commits found between upstream tag and release ref."
            else
              for commit in "${patch_commits[@]}"; do
                git log -1 --format='- `%h` %s' "${commit}"
              done
            fi
          } > "${notes_path}"
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: ${{ needs.meta.outputs.publish == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.meta.outputs.version }}-internal
          tag_name: ${{ needs.meta.outputs.internal_tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/**
          prerelease: false

      - name: Upload dry-run bundle
        if: ${{ needs.meta.outputs.publish != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: internal-release-dry-run-${{ needs.meta.outputs.version }}
          path: dist/**
