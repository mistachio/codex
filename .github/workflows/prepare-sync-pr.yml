name: prepare-sync-pr

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: Upstream rust release tag, for example rust-v0.114.0
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    if: github.repository == 'SDGLBL/codex'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: taiki-e/install-action@44c6d64aa62cd779e873306675c7a58e86d6d532 # v2
        with:
          tool: just

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare sync branch and pull request
        env:
          GH_TOKEN: ${{ github.token }}
          FORK_REPO: ${{ github.repository }}
          FORK_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          scripts/internal/prepare_sync_pr.sh "${{ inputs.upstream_tag }}"
